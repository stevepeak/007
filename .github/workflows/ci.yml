name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test

  # Applies the wf_* D1 migrations (./migrations) to the target database on push
  # to main, after CI passes. The committed wrangler.jsonc ships generic
  # placeholders; the real account/database identifiers are injected here from
  # repo secrets so this repo never carries a specific host's Cloudflare IDs.
  #
  # Required repo secrets:
  #   CLOUDFLARE_API_TOKEN   – token with D1 edit on the target account
  #   CLOUDFLARE_ACCOUNT_ID  – target Cloudflare account id
  #   D1_DATABASE_NAME       – target D1 database name (e.g. law-db)
  #   D1_DATABASE_ID         – target D1 database id
  deploy-migrations:
    name: Deploy migrations
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject D1 identifiers into wrangler.jsonc
        run: |
          sed -i "s|<CLOUDFLARE_ACCOUNT_ID>|${{ secrets.CLOUDFLARE_ACCOUNT_ID }}|" wrangler.jsonc
          sed -i "s|<D1_DATABASE_NAME>|${{ secrets.D1_DATABASE_NAME }}|" wrangler.jsonc
          sed -i "s|<D1_DATABASE_ID>|${{ secrets.D1_DATABASE_ID }}|" wrangler.jsonc

      - name: Apply wf_* D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply ${{ secrets.D1_DATABASE_NAME }} --remote
